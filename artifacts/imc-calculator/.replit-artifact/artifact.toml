kind = "web"
previewPath = "/"
title = "Calculadora de IMC"
version = "1.0.0"
id = "artifacts/imc-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21385

[services.development]
run = "pnpm --filter @workspace/imc-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imc-calculator", "run", "build" ]
publicDir = "artifacts/imc-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21385"
BASE_PATH = "/"
